# ==========================================================================
# 🐱 KITTY ULTRA RICE CONFIG - MOZART EDITION (Green Banco)
# ==========================================================================
# Transparência e Background
# ==========================================================================
background_opacity         0.15
dynamic_background_opacity yes
background                 #0a0f0a
foreground                 #57cc57
selection_background       #1a4a1a
selection_foreground       #00ff00
# ==========================================================================
# 🖋️ FONTE E TIPOGRAFIA
# ==========================================================================
font_family                JetBrainsMono Nerd Font
bold_font                  JetBrainsMono Nerd Font Bold
italic_font                JetBrainsMono Nerd Font Italic
bold_italic_font           JetBrainsMono Nerd Font Bold Italic
font_size                  11.0
disable_ligatures          never
font_features              JetBrainsMono-NF-Medium +zero +onum
# ==========================================================================
# 🕹️ CURSOR E MOUSE (Verde Fosforescente)
# ==========================================================================
cursor                     #00ff00
cursor_text_color          #0a0f0a
cursor_shape               beam
cursor_beam_thickness      2.0
cursor_blink_interval      0.3
# Mouse e URLs
url_color                  #00ff00
url_style                  double
copy_on_select             yes
pointer_shape_when_grabbed arrow
default_pointer_shape      beam
# ==========================================================================
# 🖼️ JANELAS E BORDAS
# ==========================================================================
window_padding_width       15
hide_window_decorations    yes
confirm_os_window_close    0
# Bordas em Verde Escuro
active_border_color        #00ff00
inactive_border_color      #1a4a1a
window_margin_width        2
# ==========================================================================
# 🏷️ BARRA DE ABAS (Custom Green Banco)
# ==========================================================================
tab_bar_edge               top
tab_bar_style              custom
tab_powerline_style        slanted
# Estética das abas combinando com o Zsh
tab_title_template         "{fmt.fg._1a4a1a}{fmt.bg.default} {fmt.fg._57cc57}{fmt.bg._1e3a1e} {index}:{title} {fmt.fg._1e3a1e}{fmt.bg.default} "
active_tab_title_template  "{fmt.fg._00ff00}{fmt.bg.default} {fmt.fg._0a0f0a}{fmt.bg._00ff00} {index}:{title} {fmt.fg._00ff00}{fmt.bg.default} "
# ==========================================================================
# ⌨️ MAPEAMENTO DE TECLAS
# ==========================================================================
map ctrl+c                 copy_to_clipboard
map ctrl+v                 paste_from_clipboard
map f5                     load_config_file
map f11                    toggle_fullscreen
# Janelas e Abas
map ctrl+alt+enter         launch --cwd=current
map ctrl+t                 new_tab_with_cwd
map ctrl+w                 close_tab
map ctrl+tab               next_tab
# ==========================================================================
# 🎨 PALETA DE CORES (Green Banco)
# ==========================================================================
# Black / Dark Green
color0  #0a0f0a
color8  #1a4a1a
# Red (Mais sóbrio)
color1  #f7768e
color9  #ff7a93
# Green (O destaque do seu terminal)
color2  #00ff00
color10 #39d353
# Yellow
color3  #e0af68
color11 #ff9e64
# Blue -> Verde Médio (mantendo hierarquia visual)
color4  #57cc57
color12 #57cc57
# Magenta
color5  #bb9af7
color13 #bb9af7
# Cyan -> Verde Claro
color6  #7dcfff
color14 #0db9d7
# White / Text
color7  #57cc57
color15 #a6f4a6
# ==========================================================================
# 🚀 PERFORMANCE
# ==========================================================================
repaint_delay              10
input_delay                3
sync_to_monitor            yes
enable_audio_bell          no
